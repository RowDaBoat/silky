name: Github Actions
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v5
    - uses: treeform/setup-nim-action@v6

    - run: nimby sync -g nimby.lock

    # Run tests
    - run: nim r tests/test_semantic.nim
    - run: nim r tests/test_textboxes.nim

    # Build the examples
    - run: nim c examples/basicwindow/basicwindow.nim
    - run: nim c examples/calculator/calculator.nim
    - run: nim c examples/gameplayer/gameplayer.nim
    - run: nim c examples/menu/menu.nim
    - run: nim c examples/panels/panels.nim
    - run: nim c examples/the7gui/the7gui.nim

    # Run example tests
    - name: Run calculator tests
      working-directory: examples/calculator
      run: nim r tests/test.nim

    - name: Run basicwindow tests
      working-directory: examples/basicwindow
      run: nim r tests/test.nim

    # Install Emscripten only after native checks pass.
    - uses: mymindstorm/setup-emsdk@v14
      if: matrix.os == 'ubuntu-latest'

    # Build the examples for Emscripten.
    - run: nim c -d:emscripten basicwindow.nim
      working-directory: examples/basicwindow
      if: matrix.os == 'ubuntu-latest'
    - run: nim c -d:emscripten calculator.nim
      working-directory: examples/calculator
      if: matrix.os == 'ubuntu-latest'
    - run: nim c -d:emscripten gameplayer.nim
      working-directory: examples/gameplayer
      if: matrix.os == 'ubuntu-latest'
    - run: nim c -d:emscripten menu.nim
      working-directory: examples/menu
      if: matrix.os == 'ubuntu-latest'
    - run: nim c -d:emscripten panels.nim
      working-directory: examples/panels
      if: matrix.os == 'ubuntu-latest'
    - run: nim c -d:emscripten the7gui.nim
      working-directory: examples/the7gui
      if: matrix.os == 'ubuntu-latest'
